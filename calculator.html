<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator Pro</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .calculator { background: #222; padding: 20px; border-radius: 10px; width: 400px; box-shadow: 0 0 10px #000; }
        #display { width: 100%; height: 50px; font-size: 1.5em; text-align: right; margin-bottom: 10px; background: #000; color: #0f0; border: none; padding: 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { padding: 15px; border: none; cursor: pointer; background: #444; color: white; border-radius: 4px; }
        button.sci { background: #1a5276; }
        button.op { background: #b03a2e; }
        button.eq { background: #229954; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly value="0">
        <div class="grid">
            <button class="op" onclick="clearDisplay()">AC</button>
            <button class="sci" onclick="press('Math.sin(')">sin</button>
            <button class="sci" onclick="press('Math.cos(')">cos</button>
            <button class="sci" onclick="press('Math.tan(')">tan</button>

            <button class="sci" onclick="press('Math.log10(')">log</button>
            <button class="sci" onclick="press('Math.log(')">ln</button>
            <button class="sci" onclick="press('Math.sqrt(')">√</button>
            <button class="sci" onclick="press('**')">xʸ</button>

            <button class="sci" onclick="press('Math.PI')">π</button>
            <button class="sci" onclick="press('Math.E')">e</button>
            <button class="op" onclick="backspace()">DEL</button>
            <button class="op" onclick="press('/')">/</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="op" onclick="press('*')">×</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="op" onclick="press('-')">-</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="op" onclick="press('+')">+</button>

            <button onclick="press('0')" style="grid-column: span 2;">0</button>
            <button onclick="press('.')">.</button>
            <button class="eq" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        const d = document.getElementById('display');
        function press(v) { if(d.value === '0') d.value = v; else d.value += v; }
        function clearDisplay() { d.value = '0'; }
        function backspace() { d.value = d.value.slice(0, -1) || '0'; }
        function calculate() { try { d.value = eval(d.value); } catch { d.value = 'Error'; } }
    </script>
</body>
</html>
